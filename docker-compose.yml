services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_RAWG_API_KEY: ${VITE_RAWG_API_KEY:-}
    container_name: gamevault-frontend
    ports:
      - "${FRONTEND_PUBLIC_PORT:-15173}:80"
    networks:
      - gamevault-net
    restart: unless-stopped

networks:
  gamevault-net:
    driver: bridge
